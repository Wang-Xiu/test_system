name: 用户登录测试
request:
  method: POST
  url: https://httpbin.org/post
  json:
    username: test
    password: 123456
validate:
  - eq:
      status_code: 200
  - contains:
      body.json.username: test
  - in:
      status_code: [200, 201]

---
name: 获取用户信息
request:
  method: GET
  url: https://httpbin.org/get
  params:
    user_id: 1001
validate:
  - eq:
      status_code: 200
  - eq:
      body.args.user_id: "1001"
