version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: auto_test_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: auto_test
    ports:
      - "3312:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  redis:
    image: redis:7.0-alpine
    container_name: auto_test_redis
    ports:
      - "6385:6379"
    volumes:
      - redis_data:/data

volumes:
  mysql_data:
  redis_data:
